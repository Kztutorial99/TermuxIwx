name: 🔨 Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Catatan rilis (opsional)'
        required: false
        default: 'Update terbaru TermuxIwx'

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🐘 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 📦 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: 🔨 Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: 📋 Get version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle | grep -oP '"\K[^"]+')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle | grep -oP '\d+' | head -1)
          echo "version_name=v${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "📦 Version: v${VERSION_NAME} (code: ${VERSION_CODE})"

      - name: ✍️ Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
             "artifacts/TermuxIwx-${{ steps.version.outputs.version_name }}.apk"
          ls -lh artifacts/

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TermuxIwx-APK
          path: artifacts/*.apk
          retention-days: 30

      - name: 🏷️ Setup git & create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ steps.version.outputs.version_name }}"
          git tag -f "$TAG" -m "Release $TAG"
          git push origin "$TAG" --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version_name }}
          name: "TermuxIwx ${{ steps.version.outputs.version_name }}"
          draft: false
          prerelease: false
          make_latest: true
          files: artifacts/TermuxIwx-${{ steps.version.outputs.version_name }}.apk
          body: |
            ## 📦 TermuxIwx ${{ steps.version.outputs.version_name }}

            ${{ github.event.inputs.release_notes || 'Auto-release dari GitHub Actions 🤖' }}

            ---

            ### ✨ Yang Baru
            - 🔔 **Auto-update otomatis** — app notifikasi kalau ada versi baru & bisa download langsung
            - 🛠 Fix apt search parsing (deskripsi package tampil)
            - 🎨 Light/Dark mode (DayNight theming)
            - 🗂 Tab navigation fix (tidak ada flash)
            - 🖥 Console output limit 500 baris (anti OOM)
            - 📦 MaterialCardView consistency
            - 🔽 Spinner → Material ExposedDropdownMenu

            ### 📲 Cara Install
            1. Download **TermuxIwx-${{ steps.version.outputs.version_name }}.apk** di bawah
            2. Buka di Android → tap Install
            3. Aktifkan *Sumber tidak dikenal* jika diminta

            ### ⚠️ Syarat
            - Termux dari **F-Droid** (bukan Play Store)
            - `allow-external-apps=true` di `~/.termux/termux.properties`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
